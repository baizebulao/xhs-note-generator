<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书笔记AI生成器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #f5f5f5;
  color: #333;
  min-height: 100vh;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 16px 32px;
}

/* Header */
.header {
  background: linear-gradient(135deg, #FF2442, #FF6B81);
  padding: 24px 0 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(255, 36, 66, 0.3);
}
.header h1 {
  color: #fff;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1px;
}
.header .subtitle {
  color: rgba(255,255,255,0.85);
  font-size: 12px;
  margin-top: 4px;
}
.trial-badge {
  display: inline-block;
  background: rgba(255,255,255,0.25);
  color: #fff;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 10px;
  margin-top: 8px;
}

/* Card */
.card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: #333;
  margin-bottom: 6px;
}
.form-group input,
.form-group select {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #e8e8e8;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  background: #fafafa;
  -webkit-appearance: none;
}
.form-group input::placeholder { color: #bbb; }
.form-group input:focus,
.form-group select:focus {
  border-color: #FF2442;
  background: #fff;
}

/* Button */
.btn-generate {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #FF2442, #FF6B81);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  letter-spacing: 1px;
}
.btn-generate:active { transform: scale(0.98); }
.btn-generate:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* Loading */
.loading-wrap {
  display: none;
  text-align: center;
  padding: 32px 0;
}
.loading-wrap.show { display: block; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #f0f0f0;
  border-top-color: #FF2442;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: #999;
  font-size: 14px;
}

/* Result */
.result-card { display: none; }
.result-card.show { display: block; }

.result-title {
  font-size: 20px;
  font-weight: 700;
  color: #222;
  line-height: 1.5;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid #f0f0f0;
}

.result-body {
  font-size: 15px;
  line-height: 2;
  color: #444;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.result-tags {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid #f0f0f0;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.tag {
  display: inline-block;
  background: #FFF0F2;
  color: #FF2442;
  font-size: 13px;
  padding: 3px 10px;
  border-radius: 14px;
  font-weight: 500;
}

/* Copy button */
.btn-copy {
  width: 100%;
  padding: 10px;
  margin-top: 12px;
  background: #fff;
  color: #FF2442;
  border: 1.5px solid #FF2442;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-copy:hover { background: #FFF0F2; }
.btn-copy:disabled { display: none; }

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  justify-content: center;
  align-items: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #fff;
  border-radius: 16px;
  padding: 28px 24px;
  max-width: 360px;
  width: 90%;
  text-align: center;
  animation: popIn 0.25s ease;
}
@keyframes popIn {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal-box h3 {
  font-size: 18px;
  color: #222;
  margin-bottom: 10px;
}
.modal-box p {
  font-size: 14px;
  color: #666;
  line-height: 1.7;
  margin-bottom: 20px;
}
.btn-upgrade {
  display: inline-block;
  padding: 10px 32px;
  background: linear-gradient(135deg, #FF2442, #FF6B81);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 12px;
}
.btn-close-modal {
  display: block;
  margin: 0 auto;
  background: none;
  border: none;
  color: #999;
  font-size: 13px;
  cursor: pointer;
}

/* Error */
.error-msg {
  display: none;
  color: #FF2442;
  font-size: 13px;
  text-align: center;
  margin-top: 8px;
}
.error-msg.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <h1>📕 小红书笔记AI生成器</h1>
  <div class="subtitle">一键生成爆款笔记 · AI智能创作</div>
  <div class="trial-badge" id="trialBadge">免费试用：剩余 1 次</div>
</div>

<div class="container">
  <!-- Input Card -->
  <div class="card">
    <div class="form-group">
      <label>产品/主题关键词</label>
      <input type="text" id="keyword" placeholder="例如：空气炸锅、秋冬穿搭、平价面膜" />
    </div>
    <div class="form-group">
      <label>目标受众</label>
      <input type="text" id="audience" placeholder="例如：大学生、宝妈、上班族女生" />
    </div>
    <div class="form-group">
      <label>笔记风格</label>
      <select id="style">
        <option value="种草">🌟 种草推荐</option>
        <option value="教程">📝 干货教程</option>
        <option value="分享">💬 真实分享</option>
        <option value="测评">🔍 深度测评</option>
      </select>
    </div>
    <button class="btn-generate" id="btnGenerate" onclick="generateNote()">✨ 生成笔记</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Loading -->
  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <div class="loading-text">AI 正在创作中，请稍候…</div>
  </div>

  <!-- Result -->
  <div class="card result-card" id="resultCard">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-body" id="resultBody"></div>
    <div class="result-tags" id="resultTags"></div>
    <button class="btn-copy" id="btnCopy" onclick="copyResult()">📋 一键复制笔记</button>
  </div>
</div>

<!-- Paywall Modal -->
<div class="modal-overlay" id="paywallModal">
  <div class="modal-box">
    <h3>🎉 免费试用已用完</h3>
    <p>您已体验了AI笔记生成功能<br/>升级会员即可无限次使用，解锁更多风格模板！</p>
    <button class="btn-upgrade" onclick="alert('请联系客服开通会员')">💎 立即升级会员</button>
    <button class="btn-close-modal" onclick="closeModal()">暂时不了</button>
  </div>
</div>

<script>
const API_URL = '/api/generate';
const FREE_LIMIT = 1;
const STORAGE_KEY = 'xhs_generator_used';

// --- Trial count ---
function getUsedCount() {
  return parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
}
function incrementUsed() {
  localStorage.setItem(STORAGE_KEY, String(getUsedCount() + 1));
}
function updateBadge() {
  const remaining = Math.max(0, FREE_LIMIT - getUsedCount());
  document.getElementById('trialBadge').textContent = '免费试用：剩余 ' + remaining + ' 次';
}
updateBadge();

// --- Helpers ---
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}
function showLoading(show) {
  document.getElementById('loadingWrap').classList.toggle('show', show);
  document.getElementById('btnGenerate').disabled = show;
}
function closeModal() {
  document.getElementById('paywallModal').classList.remove('show');
}

// --- Build prompt ---
function buildPrompt(keyword, audience, style) {
  const styleGuide = {
    '种草': '以种草安利的口吻，强调产品的优点和必买理由，语气热情有感染力，像闺蜜推荐好物一样',
    '教程': '以干货教程的口吻，分步骤讲解，条理清晰，给出实用可操作的建议，让读者觉得学到了',
    '分享': '以真实分享的口吻，像和朋友聊天一样自然，有个人体验感受，真实不做作',
    '测评': '以客观测评的口吻，从多个维度分析优缺点，给出专业评价和购买建议，有理有据'
  };
  const guide = styleGuide[style] || styleGuide['种草'];

  return `你是一个资深的小红书博主，擅长写出高赞爆款笔记。请根据以下信息生成一篇小红书笔记：

【产品/主题】${keyword}
【目标受众】${audience}
【笔记风格】${style} —— ${guide}

请严格按照以下 JSON 格式输出（不要输出任何其他内容，不要用 markdown 代码块包裹）：
{
  "title": "标题文字（包含1-2个emoji，15字以内，吸引眼球，可适当夸张但不要标题党）",
  "content": "正文内容（300-500字，要有emoji点缀，分段清晰，每段2-3句话，使用换行符\\n分段，语言口语化接地气，符合小红书社区风格，${guide}）",
  "tags": ["标签1", "标签2", "标签3", "标签4", "标签5", "标签6", "标签7", "标签8"]
}

要求：
- 标题要有网感和吸引力，让人忍不住点进来
- 正文开头要用一句金句或共鸣的话抓住读者
- 适当使用"姐妹们""绝绝子""冲""YYDS"等小红书常用表达但不要过度
- 标签要包含热门词和长尾词混合，8个左右
- 整体风格要像真人写的，不要像AI生成的`;
}

// --- Parse response ---
function parseResult(text) {
  // Strip markdown code fences if present
  let cleaned = text.trim();
  if (cleaned.startsWith('```')) {
    cleaned = cleaned.replace(/^```(?:json)?\s*\n?/, '').replace(/\n?```\s*$/, '');
  }
  try {
    return JSON.parse(cleaned);
  } catch (e) {
    // Try to extract JSON from text
    const match = cleaned.match(/\{[\s\S]*\}/);
    if (match) {
      return JSON.parse(match[0]);
    }
    throw new Error('无法解析生成结果');
  }
}

// --- Render result ---
function renderResult(data) {
  document.getElementById('resultTitle').textContent = data.title || '';
  document.getElementById('resultBody').textContent = (data.content || '').replace(/\\n/g, '\n');

  const tagsEl = document.getElementById('resultTags');
  tagsEl.innerHTML = '';
  (data.tags || []).forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = '#' + t;
    tagsEl.appendChild(span);
  });

  document.getElementById('resultCard').classList.add('show');
  document.getElementById('btnCopy').disabled = false;
  document.getElementById('btnCopy').textContent = '📋 一键复制笔记';
}

// --- Generate ---
async function generateNote() {
  const keyword = document.getElementById('keyword').value.trim();
  const audience = document.getElementById('audience').value.trim();
  const style = document.getElementById('style').value;

  if (!keyword) { showError('请输入产品/主题关键词'); return; }
  if (!audience) { showError('请输入目标受众'); return; }

  // Check trial
  if (getUsedCount() >= FREE_LIMIT) {
    document.getElementById('paywallModal').classList.add('show');
    return;
  }

  showLoading(true);
  document.getElementById('resultCard').classList.remove('show');

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keyword, audience, style })
    });

    if (!response.ok) {
      const errData = await response.json().catch(() => null);
      throw new Error(errData?.error || '请求失败，状态码 ' + response.status);
    }

    const data = await response.json();
    const content = data.content;
    if (!content) throw new Error('AI 返回内容为空');

    const parsed = parseResult(content);
    renderResult(parsed);
    incrementUsed();
    updateBadge();
  } catch (err) {
    console.error(err);
    showError('生成失败：' + err.message);
  } finally {
    showLoading(false);
  }
}

// --- Copy ---
function copyResult() {
  const title = document.getElementById('resultTitle').textContent;
  const body = document.getElementById('resultBody').textContent;
  const tags = Array.from(document.querySelectorAll('.result-tags .tag')).map(el => el.textContent).join(' ');
  const fullText = title + '\n\n' + body + '\n\n' + tags;

  navigator.clipboard.writeText(fullText).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✅ 已复制到剪贴板';
    btn.disabled = true;
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '📋 一键复制笔记';
    }, 2000);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = fullText;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✅ 已复制到剪贴板';
    setTimeout(() => { btn.textContent = '📋 一键复制笔记'; }, 2000);
  });
}
</script>

</body>
</html>
